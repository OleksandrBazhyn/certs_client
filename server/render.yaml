services:
  - type: web
    name: certs-server
    env: docker
    repo: https://github.com/OleksandrBazhyn/certs_client
    dockerfilePath: server/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false
      - key: CERTS_API_KEY
        sync: false
    healthCheckPath: /